// Enhanced lookup functions for new database
function findWrestlerInDB(answer) {
  const resolved = resolveAlias(answer);
  const key = ENHANCED_ALIASES[norm(resolved)] || norm(resolved);
  return WRESTLER_DATABASE[key] || null;
}

function validateAnswerNew(answer, card) {
  const wrestler = findWrestlerInDB(answer);
  if (!wrestler) {
    // Fallback to old system
    return validateAnswer(answer, card);
  }
  
  if (card.isLetter) {
    const letters = card.letters || [card.letter];
    const pts = calcLetterPts(wrestler.name, letters);
    return {valid: pts > 0, inDB: true, pts, canonical: wrestler.name};
  }
  
  if (card.type === "tag") {
    const valid = wrestler.tags.includes(card.tag);
    return {valid, inDB: true, pts: valid ? 1 : 0, canonical: wrestler.name};
  }
  
  if (card.type === "era") {
    const eras2 = card.era === "60s" ? ["60s", "70s"] : [card.era];
    const valid = wrestler.eras.some(e => eras2.includes(e));
    return {valid, inDB: true, pts: valid ? 1 : 0, canonical: wrestler.name};
  }
  
  const bonus = calcSpecificityBonus(answer, wrestler.name);
  return {valid: true, inDB: true, pts: 1 + bonus, canonical: wrestler.name, specificityBonus: bonus};
}

function getStaticDB(cardId){
  const map={
    c1:"top_rope_moves",c3:"theme_music",c5:"special_referees",
    c6:"signature_objects",c7:"catchphrases",c12:"federations",
    c13:"finishing_moves",c25:"venues",c28:"stables",c30:"video_games",
    c31:"weapons",c37:"nicknames",c38:"submission_moves",c51:"hometowns",
    c57:"ppvs",c59:"tv_shows",c62:"regular_moves",c67:"match_types",
    c72:"titles",c74:"crowd_chants",c79:"gimmick_matches",
    c83:"defunct_titles",c84:"defunct_promotions",
  };
  return map[cardId]?STATIC_DB[map[cardId]]:null;
}

function inStaticDB(answer,cardId){
  const db=getStaticDB(cardId);
  if(!db)return null;
  const n=norm(answer);
  return db.some(e=>norm(e)===n||norm(e).includes(n)||n.includes(norm(e).substring(0,6)));
}

// ── CONNECTION MONITORING ────────────────────────────────────────────────────
let connectionStatus = 'connected';
let connectionStatusEl = null;

function createConnectionStatusIndicator() {
  if (!connectionStatusEl) {
    connectionStatusEl = document.createElement('div');
    connectionStatusEl.className = 'connection-status';
    connectionStatusEl.title = 'Connection Status';
    document.body.appendChild(connectionStatusEl);
  }
}

function updateConnectionStatus(status) {
  if (connectionStatus === status) return;
  connectionStatus = status;
  
  if (!connectionStatusEl) createConnectionStatusIndicator();
  
  connectionStatusEl.className = `connection-status ${status === 'connected' ? '' : 'disconnected'}`;
  connectionStatusEl.title = status === 'connected' ? 'Connected' : 'Connection Issues';
}

// Enhanced Firebase functions with error handling and retry logic
const MAX_RETRIES = 3;
const RETRY_DELAY = 1000;

async function fbGetWithRetry(path, retries = 0) {
  try {
    updateConnectionStatus('connected');
    const response = await fetch(`${FB}/${path}.json`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.json();
  } catch (error) {
    console.warn(`Firebase GET error (attempt ${retries + 1}):`, error);
    updateConnectionStatus('disconnected');
    
    if (retries < MAX_RETRIES) {
      await new Promise(resolve => setTimeout(resolve, RETRY_DELAY * (retries + 1)));
      return fbGetWithRetry(path, retries + 1);
    }
    
    // Show user-friendly error for critical failures
    if (path.includes('rooms/') && S.roomCode) {
      S.error = 'Connection issues. Trying to reconnect...';
      render();
    }
    
    throw error;
  }
}

async function fbSetWithRetry(path, data, retries = 0) {
  try {
    updateConnectionStatus('connected');
    const response = await fetch(`${FB}/${path}.json`, {
      method: 'PUT',
      body: JSON.stringify(data)
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return true;
  } catch (error) {
    console.warn(`Firebase SET error (attempt ${retries + 1}):`, error);
    updateConnectionStatus('disconnected');
    
    if (retries < MAX_RETRIES) {
      await new Promise(resolve => setTimeout(resolve, RETRY_DELAY * (retries + 1)));
      return fbSetWithRetry(path, data, retries + 1);
    }
    
    throw error;
  }
}

async function fbPatchWithRetry(path, data, retries = 0) {
  try {
    updateConnectionStatus('connected');
    const response = await fetch(`${FB}/${path}.json`, {
      method: 'PATCH',
      body: JSON.stringify(data)
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return true;
  } catch (error) {
    console.warn(`Firebase PATCH error (attempt ${retries + 1}):`, error);
    updateConnectionStatus('disconnected');
    
    if (retries < MAX_RETRIES) {
      await new Promise(resolve => setTimeout(resolve, RETRY_DELAY * (retries + 1)));
      return fbPatchWithRetry(path, data, retries + 1);
    }
    
    throw error;
  }
}

// Update existing functions to use retry logic
async function fbGet(p) { return fbGetWithRetry(p); }
async function fbSet(p, d) { return fbSetWithRetry(p, d); }
async function fbPatch(p, d) { return fbPatchWithRetry(p, d); }

// Enhanced loading states
function setLoading(element, loading) {
  if (!element) return;
  if (loading) {
    element.classList.add('loading');
  } else {
    element.classList.remove('loading');
  }
}

// Improved error handling with user-friendly messages
function handleError(error, context = '') {
  console.error(`Error in ${context}:`, error);
  
  let message = 'Something went wrong. Please try again.';
  
  if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
    message = 'Connection issues. Check your internet and try again.';
  } else if (error.message.includes('404')) {
    message = 'Room not found or expired.';
  } else if (error.message.includes('429')) {
    message = 'Too many requests. Please wait a moment.';
  }
  
  S.error = message;
  render();
  
  // Auto-clear error after 5 seconds
  setTimeout(() => {
    if (S.error === message) {
      S.error = '';
      render();
    }
  }, 5000);
}

function initSpeechRecognition() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    return false;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  speechRecognition = new SpeechRecognition();
  speechRecognition.continuous = true;
  speechRecognition.interimResults = true;
  speechRecognition.lang = 'en-US';
  speechRecognition.maxAlternatives = 1;

  speechRecognition.onstart = function() {
    isListening = true;
    updateSpeechButton();
  };

  speechRecognition.onend = function() {
    isListening = false;
    // Dictation mode: browsers stop on their own after a pause. If we still
    // want to listen for this round, transparently restart so the player only
    // ever has to tap the mic once.
    if (continuousWanted && speechRoundActive()) {
      if (speechRestartTimer) clearTimeout(speechRestartTimer);
      speechRestartTimer = setTimeout(() => {
        if (continuousWanted && speechRoundActive()) {
          try { speechRecognition.start(); } catch (e) {}
        }
      }, 250);
    } else {
      continuousWanted = false;
    }
    updateSpeechButton();
  };

  speechRecognition.onerror = function(event) {
    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      // Permission blocked — stop trying and tell the player once.
      continuousWanted = false;
      isListening = false;
      updateSpeechButton();
      alert('Microphone access is blocked. Allow mic permission in your browser to use voice answers.');
      return;
    }
    // 'no-speech' / 'aborted' / 'network' are transient — let onend restart us.
    isListening = false;
    updateSpeechButton();
  };

  speechRecognition.onresult = function(event) {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const res = event.results[i];
      const text = res[0].transcript;
      if (res.isFinal) {
        commitSpokenAnswer(text);
      } else {
        interim += text;
      }
    }
    // Live preview of what's being heard, in whichever answer box is on screen.
    const inp = document.getElementById("ansInp") || document.getElementById("dAnsInp");
    if (inp && interim.trim()) inp.value = interim.trim();
  };

  return true;
}

// True while the player is on an active answer screen and hasn't locked in.
function speechRoundActive() {
  return (S.screen === "playing" || S.screen === "dailyplay") && !submitted;
}

// Turn a finalized spoken phrase (possibly several comma-separated names) into added answers.
function commitSpokenAnswer(raw) {
  (raw || "").split(',').forEach(part => {
    const t = part.trim();
    if (!t) return;
    const improved = improveSpeechTranscript(t);
    if (!improved || improved.length < 2) return;
    const ai = document.getElementById("ansInp");
    const di = document.getElementById("dAnsInp");
    if (ai) { ai.value = improved; addAnswer(); }
    else if (di) { di.value = improved; addDailyAnswer(); }
  });
}

// Fully stop dictation (round ended, locked in, or left the room).
function stopSpeechFully() {
  continuousWanted = false;
  if (speechRestartTimer) { clearTimeout(speechRestartTimer); speechRestartTimer = null; }
  if (speechRecognition) { try { speechRecognition.stop(); } catch (e) {} }
  isListening = false;
  updateSpeechButton();
}

function improveSpeechTranscript(transcript) {
  const lower = transcript.toLowerCase().trim();
  
  // First check direct speech aliases
  if (SPEECH_ALIASES[lower]) {
    return SPEECH_ALIASES[lower];
  }
  
  // Then check regular aliases
  if (ALIASES[lower]) {
    return ALIASES[lower];
  }
  
  // Try partial matching for longer phrases
  for (const [alias, canonical] of Object.entries(SPEECH_ALIASES)) {
    if (lower.includes(alias) || alias.includes(lower)) {
      if (Math.abs(lower.length - alias.length) <= 3) {
        return canonical;
      }
    }
  }
  
  // Return original if no improvements found
  return transcript;
}

function startSpeech() {
  if (!speechRecognition) {
    if (!initSpeechRecognition()) {
      alert('Voice answers need Chrome or Safari. You can still type your answers.');
      return;
    }
  }

  if (continuousWanted) {
    // Already dictating — tapping again stops it.
    stopSpeechFully();
    return;
  }

  continuousWanted = true;
  try { speechRecognition.start(); }
  catch (e) { /* may already be running from an auto-restart; ignore */ }
  updateSpeechButton();
}

function updateSpeechButton() {
  const btn = document.getElementById('speechBtn');
  if (!btn) return;
  if (continuousWanted) {
    btn.innerHTML = '🛑';
    btn.style.background = '#cc0000';
    btn.style.animation = 'pulse 1s infinite';
    btn.setAttribute('aria-label', 'Listening — tap to stop');
  } else {
    btn.innerHTML = '🎤';
    btn.style.background = '#333';
    btn.style.animation = 'none';
    btn.setAttribute('aria-label', 'Tap to dictate answers');
  }
}

function showSpeechFeedback(original, improved, confidence) {
  // Create or update feedback element
  let feedback = document.getElementById('speechFeedback');
  if (!feedback) {
    feedback = document.createElement('div');
    feedback.id = 'speechFeedback';
    feedback.style.cssText = `
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 16px;
      border-radius: 8px;
      max-width: 280px;
      text-align: center;
      z-index: 10000;
      font-size: 14px;
      border: 2px solid #cc0000;
    `;
    document.body.appendChild(feedback);
  }
  
  const confidenceColor = confidence > 0.8 ? '#4CAF50' : confidence > 0.6 ? '#FF9800' : '#F44336';
  const confidenceText = Math.round(confidence * 100) + '%';
  
  feedback.innerHTML = `
    <div style="margin-bottom: 8px; font-weight: 700;">Speech Recognition</div>
    <div style="margin-bottom: 4px; color: #ccc;">Heard: "${original}"</div>
    ${original !== improved ? `<div style="margin-bottom: 8px; color: #4CAF50;">→ "${improved}"</div>` : ''}
    <div style="color: ${confidenceColor}; font-size: 12px;">Confidence: ${confidenceText}</div>
  `;
  
  // Auto-hide after 3 seconds
  setTimeout(() => {
    if (feedback && feedback.parentNode) {
      feedback.parentNode.removeChild(feedback);
    }
  }, 3000);
}

let FB_AVAILABLE=true;

async function fbGet(p){
  if(!FB_AVAILABLE&&Date.now()-FB_LAST_CHECK<30000)return null;
  try{
    const r=await fetch(`${FB}/${p}.json`);
    if(!r.ok){return null;}
    FB_AVAILABLE=true;FB_WARNED=false;
    return r.json();
  }catch(e){
    FB_AVAILABLE=false;FB_LAST_CHECK=Date.now();
    if(!FB_WARNED){console.warn('Firebase unreachable — using localStorage fallback');FB_WARNED=true;}
    return null;
  }
}
async function fbSet(p,d){
  if(!FB_AVAILABLE&&Date.now()-FB_LAST_CHECK<30000)return false;
  try{
    const r=await fetch(`${FB}/${p}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});
    if(r.ok){FB_AVAILABLE=true;FB_WARNED=false;}
    return r.ok;
  }catch(e){
    FB_AVAILABLE=false;FB_LAST_CHECK=Date.now();
    return false;
  }
}
async function fbPatch(p,d){

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function norm(s){return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"").trim();}
function genCode(){return Math.random().toString(36).substr(2,5).toUpperCase();}
function col(i){return COLORS[i%COLORS.length];}
function dots(count,target){let h="";for(let i=0;i<target;i++)h+=`<span class="pinfall-dot" style="background:${i<count?"#CC0000":"#ddd"}"></span>`;return h;}
function resolveAlias(input){const key=(input||"").toLowerCase().trim();return ALIASES[key]||input;}
function smartMatch(a,b){
  if(!a||!b)return false;
  const na=norm(resolveAlias(a)),nb=norm(resolveAlias(b));
  if(na===nb)return true;
  const sort=s=>s.toLowerCase().replace(/^the\s+/,"").replace(/[^a-z0-9\s]/g,"").trim().split(/\s+/).sort().join("");
  if(sort(resolveAlias(a))===sort(resolveAlias(b)))return true;
  // Partial match only if BOTH sides are at least 5 chars - prevents "h" matching "Triple H"
  if(na.length>=5&&nb.length>=5&&(na.includes(nb)||nb.includes(na)))return true;
  return false;
}

function calcSpecificityBonus(answer, canonicalName){
  const rawNorm=norm(answer);
  const canonNorm=norm(canonicalName);
  if(rawNorm===canonNorm)return 0;
  // Typed more than canonical - likely a nickname/fuller form
  if(rawNorm.length>canonNorm.length+2)return 1;
  // Alias resolved to canonical - typed alternate form
  const resolvedNorm=norm(resolveAlias(answer));
  if(resolvedNorm===canonNorm&&rawNorm!==canonNorm&&rawNorm.length>4)return 1;
  return 0;
}

function resolveGimmick(canonical){
  const k=norm(canonical);
  return SAME_PERSON[k]||k;
}

function resolveSelfDuplicates(playerAnswers){
  // Find best answer per canonical person — respecting gimmick aliases
  const personBest={};
  playerAnswers.forEach((a,idx)=>{
    if(!a.valid)return;
    const canon=a.canonical?norm(a.canonical):norm(a.answer);
    const person=resolveGimmick(canon);// collapse gimmicks to same person key
    if(!personBest[person]||(a.pts||0)>(personBest[person].pts||0)){
      personBest[person]={...a,_idx:idx,_personKey:person};
    }
  });
  return playerAnswers.map((a,idx)=>{
    if(!a.valid)return a;
    const canon=a.canonical?norm(a.canonical):norm(a.answer);
    const person=resolveGimmick(canon);
    // Winner is the entry whose _idx matches; everyone else for that person is a dup.
    if(personBest[person]&&personBest[person]._idx===idx)return a;
    return{...a,selfDuplicate:true,pts:0};
  });
}

function findInDB(answer){const resolved=resolveAlias(answer);return WRESTLERS.find(w=>smartMatch(w[0],resolved));}
function calcLetterPts(name,letters){
  const ls=Array.isArray(letters)?letters:[letters];
  const upper=name.toUpperCase().replace(/^THE\s+/,"");
  const words=upper.split(/[\s.\-]+/).filter(Boolean);
  const skipWords=["AND","VON","VAN","DEL","DOS","LOS","THE"];
  let pts=0;
  words.forEach(w=>{
    if(skipWords.includes(w))return;
    // Short all-caps = initials (HHH, RVD, DX, AJ) - count each letter
    if(w.length<=4&&/^[A-Z0-9]+$/.test(w)){
      w.split("").forEach(ch=>{if(ls.includes(ch))pts++;});
    } else {
      if(ls.includes(w[0]))pts++;
    }
  });
  return pts>0?pts:0;
}
function validateAnswer(answer,card){
  if(!card)return{valid:null,inDB:false,pts:0,canonical:answer};
  // Check static DB first for non-wrestler cards
  if(!card.isLetter&&!card.type&&card.id){
    const inStatic=inStaticDB(answer,card.id);
    if(inStatic!==null)return{valid:inStatic,inDB:true,pts:1,canonical:answer};
  }
  // Pair card types — answer must contain two wrestlers
  const isPairCard=card.tag==="storyline_relation"||card.tag==="real_relation"||card.tag==="feud"||card.id==="c71"||card.id==="c53"||card.id==="c55"||card.id==="c56";
  // Split on "and", "vs", "vs.", "&"
  const pairSplit=answer.toLowerCase().split(/\s+(?:and|vs\.?|&)\s+/);
  if(pairSplit.length>=2){
    const parts=pairSplit.map(p=>_validateSingle(p.trim(),card));
    if(isPairCard){
      // Both must be in DB and valid for pair cards
      const bothInDB=parts.every(p=>p.inDB);
      const bothValid=parts.every(p=>p.valid!==false);
      if(bothInDB)return{valid:bothValid,inDB:true,pts:bothValid?1:0,canonical:parts.map(p=>p.canonical).join(" and ")};
    } else {
      // Non-pair card: take the best scoring part
      const inDBParts=parts.filter(r=>r.inDB);
      if(inDBParts.length>0)return inDBParts.reduce((a,b)=>(a.pts||0)>=(b.pts||0)?a:b);
    }
  }
  return _validateSingle(answer,card);
}

function _validateSingle(answer,card){
  const resolved=resolveAlias(answer);
  const entry=findInDB(resolved);
  if(!entry)return{valid:null,inDB:false,pts:0,canonical:resolved};
  const[name,eras,promos,tags]=entry;
  if(card.isLetter){
    const letters=card.letters||[card.letter];
    const pts=calcLetterPts(name,letters);
    return{valid:pts>0,inDB:true,pts,canonical:name};
  }
  if(card.type==="compound"){
    // Compound gauntlet card — AND multiple conditions
    let valid=true;
    if(card.era&&!eras.includes(card.era))valid=false;
    if(card.tag&&!tags.includes(card.tag))valid=false;
    if(card.tag2&&!tags.includes(card.tag2))valid=false;
    if(card.promo&&!promos.includes(card.promo))valid=false;
    return{valid,inDB:true,pts:valid?1:0,canonical:name};
  }
  if(card.type==="tag"){
    if(card.tag==="ecw"){const valid=promos.includes("ecw");return{valid,inDB:true,pts:valid?1:0,canonical:name};}
    if(card.tag==="realname"){const valid=tags.includes("realname");return{valid,inDB:true,pts:valid?1:0,canonical:name};}
    const valid=tags.includes(card.tag);return{valid,inDB:true,pts:valid?1:0,canonical:name};
  }
  if(card.type==="era"){
    const eras2=card.era==="60s"?["60s","70s"]:[card.era];
    const valid=eras.some(e=>eras2.includes(e));
    return{valid,inDB:true,pts:valid?1:0,canonical:name};
  }
  const bonus=calcSpecificityBonus(answer,name);
  return{valid:true,inDB:true,pts:1+bonus,canonical:name,specificityBonus:bonus};
}

// Background music: simple upbeat loop
let bgMusInterval=null;
let bgMusNodes=[];
let bgMusGain=null;

function startBgMusic(){
  if(!S.soundOn||bgMusInterval)return;
  try{
    if(!getAC())return;
    const c=getAC();if(!c)return;
    bgMusGain=c.createGain();
    bgMusGain.gain.value=0.055;
    bgMusGain.connect(c.destination);
    // Simple bassline: E A B A pattern at 130bpm
    const notes=[41,41,45,41,38,41,45,48]; // midi-ish Hz values *2
    const freqs=notes.map(n=>82*Math.pow(2,(n-41)/12));
    let beat=0;
    const bps=130/60;
    const beatLen=1/bps;
    function playBeat(){
      if(!bgMusGain)return;
      try{
        const now=c.currentTime;
        const f=freqs[beat%freqs.length];
        const o=c.createOscillator(),g=c.createGain();
        o.type="triangle";o.frequency.value=f;
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(0.9,now+0.02);
        g.gain.setValueAtTime(0.9,now+beatLen*0.35);
        g.gain.exponentialRampToValueAtTime(0.001,now+beatLen*0.55);
        o.connect(g);g.connect(bgMusGain);
        o.start(now);o.stop(now+beatLen*0.6);
        bgMusNodes.push(o);
        // Kick on beats 0,2
        if(beat%2===0){
          const ok=c.createOscillator(),gk=c.createGain();
          ok.type="sine";ok.frequency.setValueAtTime(160,now);
          ok.frequency.exponentialRampToValueAtTime(40,now+0.08);
          gk.gain.setValueAtTime(0.35,now);
          gk.gain.exponentialRampToValueAtTime(0.001,now+0.12);
          ok.connect(gk);gk.connect(bgMusGain);
          ok.start(now);ok.stop(now+0.15);
          bgMusNodes.push(ok);
        }
        // Snare on beats 1,3
        if(beat%2===1){
          const buf=c.createBuffer(1,Math.floor(c.sampleRate*0.08),c.sampleRate);
          const d=buf.getChannelData(0);
          for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.04));
          const src=c.createBufferSource(),gs=c.createGain();
          src.buffer=buf;gs.gain.value=0.25;
          src.connect(gs);gs.connect(bgMusGain);
          src.start(now);
          bgMusNodes.push(src);
        }
        beat++;
        if(bgMusNodes.length>40)bgMusNodes.splice(0,20);
      }catch{}
    }
    playBeat();
    bgMusInterval=setInterval(playBeat,beatLen*1000);
  }catch{}
}

function stopBgMusic(){
  if(bgMusInterval){clearInterval(bgMusInterval);bgMusInterval=null;}
  bgMusNodes.forEach(n=>{try{n.stop();}catch{}});
  bgMusNodes=[];
  if(bgMusGain){try{bgMusGain.disconnect();}catch{}}
  bgMusGain=null;
}

function verbalCountdown(from,onDone){
  if(!S.soundOn){setTimeout(onDone,from*1000);return;}
  let count=from;
  function say(){
    if(count<0){onDone();return;}
    if(count===0){
      // Bell at zero
      try{const c=getAC(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(0.3,n);g.gain.exponentialRampToValueAtTime(0.001,n+1.5);o.start(n);o.stop(n+1.5);}catch{}
      count--;setTimeout(say,1200);return;
    }
    if(window.speechSynthesis){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(String(count));
      u.rate=1.2;u.pitch=1.1;u.volume=0.65;
      window.speechSynthesis.speak(u);
    }
    count--;setTimeout(say,1000);
  }
  say();
}

const BOT_NAMES=["CPU Bot","The Bot","Jobber Bot","Bot Lesnar","RoboRassler"];
const BOT_TAUNTS={

  midcarder:["Mid-Carder Bot ready. This won't be easy.","CPU warming up. Expect a fight.","The Bot has been studying tape. Watch out."],

function getBotName(){return BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];}
function safeKey(name){return name.replace(/[^a-zA-Z0-9]/g,"_");}
function getBotAnswers(card,difficulty){
  let pool=[];
  if(card.isLetter){
    const letters=card.letters||[card.letter];
    letters.forEach(l=>{if(BY_LETTER[l])pool.push(...BY_LETTER[l]);});
  }else if(card.type==="tag"&&BY_TAG[card.tag]){
    pool=[...BY_TAG[card.tag]];
  }else if(card.type==="era"&&BY_ERA[card.era]){
    pool=[...BY_ERA[card.era]];
    if(card.era==="60s"&&BY_ERA["70s"])pool.push(...BY_ERA["70s"]);
  }else if(card.type==="compound"){
    pool=WRESTLERS.filter(w=>{
      let ok=true;
      if(card.era&&!w[1].includes(card.era))ok=false;
      if(card.tag&&!w[3].includes(card.tag))ok=false;
      if(card.tag2&&!w[3].includes(card.tag2))ok=false;
      if(card.promo&&!w[2].includes(card.promo))ok=false;
      return ok;
    });
  }else{
    pool=[...WRESTLERS];
  }
  // Shuffle pool
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  // Pick count based on difficulty
  const counts={jobber:[3,5],midcarder:[6,8],maineventer:[8,11]};
  const[min,max]=counts[difficulty]||counts.jobber;
  const count=min+Math.floor(Math.random()*(max-min+1));
  return pool.slice(0,count).map(w=>w[0]);
}
function getBotSubmitDelay(difficulty){
  const ranges={jobber:[38000,55000],midcarder:[22000,38000],maineventer:[10000,22000]};
  const[min,max]=ranges[difficulty]||ranges.jobber;
  return min+Math.floor(Math.random()*(max-min));
}
async function runBot(roomCode,card,difficulty,botName){
  const answers=getBotAnswers(card,difficulty);

async function aiJudge(entries,card){
  if(!entries.length)return[];
  // Check cache first — skip AI for already-validated answers
  const uncached=[];const results=[];
  for(const e of entries){
    const cached=await getCachedAnswer(e.answer,card.id);
    if(cached){results.push({...e,valid:cached.valid,canonical:cached.canonical,pts:cached.pts,fromCache:true});}
    else{uncached.push(e);}
  }
  if(!uncached.length)return results;
  // AI judging key intentionally not shipped in client code (would be public).
  // Re-enable by routing through a secure proxy (Option B) and setting AI_KEY there.
  const AI_KEY="";
  if(!AI_KEY){
    return [...results,...uncached.map(e=>({...e,valid:false,canonical:e.answer,pts:0}))];
  }
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",max_tokens:2000,
        system:`You are judging a wrestling Scattergories game. Be strict but fair. Card: "${card.prompt}". Only accept documented real wrestling answers. Return ONLY JSON array: [{"player":"","answer":"","valid":true,"canonical":"name","pts":1}]`,
        messages:[{role:"user",content:`Validate for card "${card.prompt}":\n${JSON.stringify(uncached)}`}]
      })
    });
    const data=await res.json();
    const text=data.content.map(b=>b.text||"").join("").trim();
    const aiResults=JSON.parse(text.replace(/```json|```/g,"").trim());
    // Cache all AI results and track community submissions
    for(const r of aiResults){
      await setCachedAnswer(r.answer,card.id,r);
      await trackCommunityAnswer(r.answer,card.id,r.valid);
      results.push(r);
    }
    return results;
  }catch(e){
    const fallback=uncached.map(e=>({...e,valid:false,canonical:e.answer,pts:0}));
    return [...results,...fallback];
  }
}

function saveLocalLB(type,name,score){
  try{
    const uid=MY_UID||'local';
    const key='sub_lb_'+type;
    const existing=JSON.parse(localStorage.getItem(key)||'{}');
    const cur=existing[uid]?Number(existing[uid].score)||0:0;

function mergeLB(firebase,local){
  if(!firebase&&!local)return null;
  const merged={...(local||{})};
  if(firebase){Object.entries(firebase).forEach(([k,v])=>{
    const fScore=typeof v==='object'?Number(v.score||0):Number(v||0);
    const lScore=merged[k]?Number(merged[k].score||0):0;
    if(fScore>lScore)merged[k]=v;
  });}
  return merged;
}
function sortLB(data){
  if(!data)return[];
  return Object.entries(data)
    .map(([uid,v])=>({uid,name:typeof v==="object"?v.name:uid,score:typeof v==="object"?v.score:v}))
    .filter(e=>e.score>0)
    .sort((a,b)=>b.score-a.score).slice(0,10);

async function updateLB(name,score){
  if(!name||score==null||score<0)return;
  await ensureAuth();
  // Always save locally first as fallback
  saveLocalLB('daily',name,score);
  saveLocalLB('alltime',name,score);
  const today=new Date().toISOString().split("T")[0];
  const week=`week_${getWeek()}`;
  const uid=MY_UID;
  if(!uid){console.warn('updateLB: no UID, skipping');return;}
  try{
    const[cd,cw,ca]=await Promise.all([
      fbGet(`lb/daily/${today}/${uid}`),
      fbGet(`lb/weekly/${week}/${uid}`),
      fbGet(`lb/alltime/${uid}`)
    ]);
    const cur_d=cd&&typeof cd==="object"?Number(cd.score||0):Number(cd||0);
    const cur_w=cw&&typeof cw==="object"?Number(cw.score||0):Number(cw||0);
    const cur_a=ca&&typeof ca==="object"?Number(ca.score||0):Number(ca||0);
    const writes=[];
    if(score>cur_d||!cd)writes.push(fbSet(`lb/daily/${today}/${uid}`,{name,score}));
    if(score>cur_w||!cw)writes.push(fbSet(`lb/weekly/${week}/${uid}`,{name,score}));
    writes.push(fbSet(`lb/alltime/${uid}`,{name,score:cur_a+score}));
    const results=await Promise.all(writes);
    const allOk=results.every(r=>r!==false);
    if(!allOk){
      // Retry once after 1s
      await new Promise(r=>setTimeout(r,1000));
      if(score>cur_d||!cd)await fbSet(`lb/daily/${today}/${uid}`,{name,score});
      await fbSet(`lb/alltime/${uid}`,{name,score:cur_a+score});
    }
    console.log('LB saved:',name,score,'points, uid:',uid.slice(0,12));
  }catch(e){
    console.error('updateLB error:',e.message);
  }
}

function getDailyHash(dateStr){
  // djb2 hash — distributes evenly, no repeats for many years across deck size
  let h=5381;
  for(let i=0;i<dateStr.length;i++){h=((h<<5)+h)+dateStr.charCodeAt(i);}
  return Math.abs(h);
}
function getDailyCard(){

  // Filter to non-letter, non-open-ended cards for standard daily
  const pool=CARDS.filter(c=>!c.isLetter&&c.type);
  return pool[getDailyHash(today)%pool.length];
}
function getGauntletCard(){
  // Compound daily — auto-generate from era+tag combinations
  const today=new Date().toISOString().split("T")[0];
  const hash=getDailyHash(today+"_gauntlet");

}
function generateCompoundCard(seed){
  const eras=[{id:"80s",label:"1980s"},{id:"90s",label:"1990s"},{id:"2000s",label:"2000s"},{id:"2010s",label:"2010s"},{id:"2020s",label:"2020s"}];
  const tags=[
    {id:"female",label:"Female"},{id:"masked",label:"Masked"},{id:"painted",label:"Face-Painted"},
    {id:"tag",label:"Tag Team"},{id:"submission",label:"Submission Specialist"},
    {id:"highflyer",label:"High-Flying"},{id:"heavyweight",label:"Heavyweight"},
    {id:"supernatural",label:"Supernatural"},{id:"bald",label:"Bald"},
    {id:"tattoos",label:"Tattooed"},{id:"dance",label:"Dancers"},
    {id:"hof",label:"Hall of Fame"},{id:"deceased",label:"Deceased"},
    {id:"canadian",label:"Canadian"},{id:"mexican",label:"Mexican"},
    {id:"japanese",label:"Japanese"},{id:"european",label:"European"},
    {id:"books",label:"Book Authors"},{id:"mma",label:"MMA Background"},
    {id:"sports",label:"Pro Athletes"},{id:"celebrity",label:"Celebrities"},
    {id:"multi_champ",label:"Multi-Time World Champions"},
    {id:"hardcore",label:"Hardcore"}
  ];
  const promos=[{id:"wwf",label:"WWF/WWE"},{id:"wcw",label:"WCW"},{id:"aew",label:"AEW"},{id:"njpw",label:"NJPW"},{id:"tna",label:"TNA/Impact"}];
  const type=seed%3;
  if(type===0){
    // era + tag
    const era=eras[seed%eras.length];
    const tag=tags[(seed>>3)%tags.length];
    const matching=WRESTLERS.filter(w=>w[1].includes(era.id)&&w[3].includes(tag.id));
    if(matching.length<3)return generateCompoundCard(seed+1);
    return{id:"gauntlet_"+seed,prompt:`${tag.label} Wrestlers From the ${era.label}`,type:"compound",era:era.id,tag:tag.id,diff:"maineventer",isGauntlet:true};
  }else if(type===1){
    // tag + tag
    const t1=tags[seed%tags.length];
    const t2=tags[(seed>>4)%tags.length];
    if(t1.id===t2.id)return generateCompoundCard(seed+1);
    const matching=WRESTLERS.filter(w=>w[3].includes(t1.id)&&w[3].includes(t2.id));
    if(matching.length<3)return generateCompoundCard(seed+1);
    return{id:"gauntlet_"+seed,prompt:`${t1.label} Wrestlers Who Are Also ${t2.label}`,type:"compound",tag:t1.id,tag2:t2.id,diff:"maineventer",isGauntlet:true};
  }else{
    // promo + tag
    const promo=promos[seed%promos.length];
    const tag=tags[(seed>>2)%tags.length];
    const matching=WRESTLERS.filter(w=>w[2].includes(promo.id)&&w[3].includes(tag.id));
    if(matching.length<3)return generateCompoundCard(seed+1);
    return{id:"gauntlet_"+seed,prompt:`${tag.label} Wrestlers Who Competed in ${promo.label}`,type:"compound",promo:promo.id,tag:tag.id,diff:"maineventer",isGauntlet:true};
  }
}

function normName(s){
  return s.toLowerCase()
    .replace(/[\s\-_\.]/g,"")
    .replace(/0/g,"o").replace(/1/g,"i").replace(/3/g,"e")
    .replace(/4/g,"a").replace(/5/g,"s").replace(/8/g,"b")
    .replace(/[$]/g,"s").replace(/@/g,"a").replace(/[!]/g,"i")
    .replace(/[^a-z0-9]/g,"");
}

function isAnswerBanned(s){
  const n=normName(s);

  S.roomCode=c;S.isHost=false;S.room={...room,players,pinfalls,scores};
  S.screen="lobby";startPolling();render();
  // Public rooms: trigger auto-start check
  if(room.isPublic)checkPublicAutoStart();
}

  heartbeatInt=setInterval(async()=>{
    if(S.roomCode&&S.isHost)await fbPatch(`rooms/${S.roomCode}`,{hostLastSeen:Date.now()});
  },15000);
}

  S.isHost=true;S.room={...S.room,host:S.myName};
  heartbeat();render();
}

function startPolling(){
  if(pollInt)clearInterval(pollInt);
  pollInt=setInterval(async()=>{
    try {
      const room=await fbGet(`rooms/${S.roomCode}`);
      if(!room)return;
      const prev=S.room;S.room=room;
      // Always react to gameover regardless of previous phase
      if(room.phase==="gameover"&&S.screen!=="scoreboard"){showGameover();return;}
      if(prev?.phase!==room.phase){
        if(room.phase==="countdown")startCountdown();
        else if(room.phase==="playing"){
          if(room.roundStartedAt){
            const elapsed=Math.floor((Date.now()-room.roundStartedAt)/1000);
            const remaining=Math.max(1,60-elapsed);
            if(S.screen!=="playing"&&S.screen!=="waiting")S.timeLeft=remaining;
          }
          startTimer();
        }
        else if(room.phase==="results")showResults();
        else if(room.phase==="gameover")showGameover();
      }
      if(["lobby","waiting","results"].includes(room.phase))render();
    } catch (error) {
      handleError(error, 'polling');
    }
  },1500);
}

// ── PUBLIC ROOM AUTO-START ────────────────────────────────────────────────────
let publicAutoStartInt=null,publicBotInt=null;
function checkPublicAutoStart(){
  if(publicAutoStartInt)return;
  publicAutoStartInt=setInterval(async()=>{
    const room=await fbGet(`rooms/${S.roomCode}`);if(!room||room.phase!=="lobby")return;
    const players=room.players||[];
    const maxP=room.maxPlayers||4;
    // Room full — auto-start in 5s
    if(players.length>=maxP){
      clearInterval(publicAutoStartInt);publicAutoStartInt=null;
      clearInterval(publicBotInt);publicBotInt=null;
      setTimeout(()=>{if(S.isHost||players[0]===S.myName)startRound();},5000);
    }
  },1000);
  // Bot fill — if still alone after 15s, add a bot
  publicBotInt=setTimeout(async()=>{
    const room=await fbGet(`rooms/${S.roomCode}`);
    if(!room||room.phase!=="lobby")return;
    if((room.players||[]).length<2){
      const botName=getBotName();
      const diff=room.difficulty||"jobber";
      const players=[...(room.players||[]),botName];
      const pinfalls={...(room.pinfalls||{}),[botName]:0};
      const scores={...(room.scores||{}),[botName]:0};
      await fbPatch(`rooms/${S.roomCode}`,{players,pinfalls,scores});
      S.room={...S.room,players,pinfalls,scores,botName,botDiff:diff};
      // Auto-start now
      clearInterval(publicAutoStartInt);publicAutoStartInt=null;
      setTimeout(()=>{startRound();},3000);
    }
  },15000);
}

async function startRound(){
  if(autoFlipInt){clearInterval(autoFlipInt);autoFlipInt=null;}
  // No solo matches — never start a round against an empty room. Add a CPU opponent first.
  if((S.room?.players||[]).length<2&&!S.room?.botName){
    await addBotToRoom();
  }
  const usedCards=S.room?.usedCards||[];
  const pool=getCardPool().filter(c=>!usedCards.includes(c.id));
  const available=pool.length>0?pool:getCardPool();
  const card=shuffle(available)[0];
  const newUsed=[...usedCards,card.id];
  const round=(S.room?.round||0)+1;
  await fbPatch(`rooms/${S.roomCode}`,{phase:"countdown",card,round,usedCards:newUsed,answers:{},submittedPlayers:{}});
  // Kick off bot if room has one
  if(S.room?.botName){
    const diff=S.room.botDiff||S.roomDifficulty||"jobber";
    runBot(S.roomCode,card,diff,S.room.botName);
  }
}

let judging=false;
async function checkAllSubmitted(){
  if(S.screen!=="waiting")return;
  const room=await fbGet(`rooms/${S.roomCode}`);if(!room)return;
  if(room.phase==="results"){S.room=room;showResults();return;}
  if(room.phase==="gameover"){S.room=room;showGameover();return;}
  const submittedMap=room.submittedPlayers||{};
  const submittedCount=Object.keys(submittedMap).length;
  const totalPlayers=(room.players||[]).length;
  S.room=room;render();
  if(submittedCount>=totalPlayers){
    if(S.isHost&&!judging){
      judging=true;
      await judgeRound(room);
      judging=false;
    } else if(!S.isHost){
      setTimeout(checkAllSubmitted,800);
    }
  } else {
    setTimeout(checkAllSubmitted,800);
  }
}

async function judgeRound(room){
  const card=room.card;const answers=room.answers||{};const allEntries=[];
  Object.entries(answers).forEach(([player,data])=>{(data.answers||[]).forEach(answer=>{allEntries.push({player,answer});});});
  const localVals=allEntries.map(e=>{const v=validateAnswer(e.answer,card);return{...e,localValid:v.valid,inDB:v.inDB,pts:v.pts,canonical:v.canonical};});
  const needsAI=localVals.filter(e=>!e.inDB||e.localValid===null);
  let aiResults=[];if(needsAI.length>0)aiResults=await aiJudge(needsAI,card);
  const finalMap={};
  localVals.forEach(e=>{finalMap[`${e.player}::${norm(e.answer)}`]={...e,valid:e.localValid};});
  aiResults.forEach(ai=>{const k=`${ai.player}::${norm(ai.answer)}`;if(finalMap[k])finalMap[k]={...finalMap[k],valid:ai.valid,canonical:ai.canonical||finalMap[k].canonical,pts:ai.pts||0};});
  let validated=Object.values(finalMap);
  // Cross-player duplicate detection — use gimmick-aware person key
  const canonicalCount={};
  validated.forEach(e=>{
    if(e.valid){
      const cn=resolveGimmick(norm(e.canonical||e.answer));
      canonicalCount[cn]=(canonicalCount[cn]||0)+1;
    }
  });
  validated.forEach(e=>{
    const cn=resolveGimmick(norm(e.canonical||e.answer));
    if(e.valid&&canonicalCount[cn]>1)e.crossDuplicate=true;
  });
  const pointsThisRound={};room.players.forEach(p=>pointsThisRound[p]=0);
  validated.forEach(e=>{if(e.valid&&!e.crossDuplicate&&!e.selfDuplicate)pointsThisRound[e.player]=(pointsThisRound[e.player]||0)+(e.pts||1);});
  const maxPts=Math.max(...Object.values(pointsThisRound));
  const roundWinners=maxPts>0?room.players.filter(p=>pointsThisRound[p]===maxPts):[];
  const newPinfalls={...room.pinfalls};roundWinners.forEach(p=>{newPinfalls[p]=(newPinfalls[p]||0)+1;});
  const newScores={...room.scores};room.players.forEach(p=>{newScores[p]=(newScores[p]||0)+(pointsThisRound[p]||0);});
  const target=room.pinfallsTarget||3;
  const gameWinner=room.players.find(p=>newPinfalls[p]>=target)||null;
  if(roundWinners.length>0)pinfallSound();
  await fbPatch(`rooms/${S.roomCode}`,{phase:gameWinner?"gameover":"results",roundResults:{validated,pointsThisRound,roundWinners,pinfalls:newPinfalls},pinfalls:newPinfalls,scores:newScores,gameWinner});
}

function showResults(){
  S.roundResults=S.room?.roundResults;
  S.screen="results";submitted=false;
  // Track best answer across all rounds
  if(S.roundResults?.validated){
    S.roundResults.validated.forEach(v=>{
      if(v.valid&&!v.crossDuplicate&&!v.selfDuplicate&&(v.pts||0)>((S.bestAnswer?.pts)||0)){
        S.bestAnswer={answer:v.answer,pts:v.pts,player:v.player,canonical:v.canonical};
      }
    });
  }
  render();
  // Only start auto-advance if game isn't over
  if(S.room?.gameWinner||S.room?.phase==="gameover")return;
  const target=S.room?.pinfallsTarget||3;
  const pinfalls=S.roundResults?.pinfalls||S.room?.pinfalls||{};
  const anyWinner=Object.values(pinfalls).some(v=>v>=target);
  if(anyWinner)return;// game over — don't auto-advance
  if(S.room?.isPublic)startAutoAdvance();
  else if(S.isHost)startAutoFlipTimer();
}

async function nextRound(){
  judging=false;
  if(autoAdvanceInt){clearInterval(autoAdvanceInt);autoAdvanceInt=null;}
  if(autoFlipInt){clearInterval(autoFlipInt);autoFlipInt=null;}
  // Safety check: re-read room from Firebase before advancing
  const freshRoom=await fbGet(`rooms/${S.roomCode}`);
  if(!freshRoom)return;
  // If game is already over, show scoreboard instead of starting new round
  if(freshRoom.phase==="gameover"||freshRoom.gameWinner){S.room=freshRoom;showGameover();return;}
  // Also check pinfalls directly as double-safety
  const target=freshRoom.pinfallsTarget||3;
  const anyWinner=Object.entries(freshRoom.pinfalls||{}).find(([,v])=>v>=target);
  if(anyWinner){S.room=freshRoom;showGameover();return;}
  await fbPatch(`rooms/${S.roomCode}`,{phase:"lobby",roundResults:null,roundStartedAt:null,answers:{},submittedPlayers:{}});
  S.screen="lobby";submitted=false;render();
  if(S.room?.isPublic)startRound();
  else startAutoFlipTimer();
}

  const needsAI=localVals.filter(e=>!e.inDB||e.localValid===null);
  let aiResults=[];if(needsAI.length>0)aiResults=await aiJudge(needsAI,card);
  const finalMap={};
  localVals.forEach(e=>{finalMap[norm(e.answer)]={...e,valid:e.localValid};});
  aiResults.forEach(ai=>{const k=norm(ai.answer);if(finalMap[k])finalMap[k]={...finalMap[k],valid:ai.valid,canonical:ai.canonical||finalMap[k].canonical,pts:ai.pts||0};});
  let results=Object.values(finalMap);
  results=resolveSelfDuplicates(results);
  const totalPts=results.reduce((s,r)=>s+(r.valid&&!r.selfDuplicate?r.pts||1:0),0);
  S.dailyResults={results,totalPts,card,lbSaved:false};
  render();// show results immediately while saving
  // Save to leaderboard — use stored name or fallback
  const saveName=S.myName||localStorage.getItem("sub_name")||"Player";
  if(saveName&&!isNameBanned(saveName)&&totalPts>=0){
    try{
      if(S.dailyMode==="gauntlet"){
        await updateGauntletLB(saveName,totalPts);
      } else {
        await updateLB(saveName,totalPts);
      }
      S.dailyResults={...S.dailyResults,lbSaved:true};
      render();// re-render to show saved checkmark
    }catch(e){
      console.error('LB save failed:',e);
    }
  }
}

async function startChallenge(player,answer,pts){

  S.challenges[S.myName]=(used+1);

  });

async function listenForChallengeResult(id,player,answer,pts){
  const pNames=S.room?.players||[];
  const totalVoters=pNames.length-1;// excluding challenged player
  let checks=0;
  const poll=setInterval(async()=>{
    checks++;
    const ch=await fbGet(`challenges/${id}`);
    if(!ch||!ch.active||checks>25){clearInterval(poll);return;}
    const votes=ch.votes||{};
    const voteCount=Object.keys(votes).length;
    const upVotes=Object.values(votes).filter(v=>v==="up").length;
    const downVotes=Object.values(votes).filter(v=>v==="down").length;
    // Resolve when all voted or deadline passed
    if(voteCount>=totalVoters||Date.now()>ch.deadline){
      clearInterval(poll);
      await fbPatch(`challenges/${id}`,{active:false,resolved:true,result:upVotes>downVotes?"upheld":"overturned"});
      if(upVotes>downVotes){
        // Challenge upheld — answer is invalid, remove points
        alert(`✅ Challenge upheld! "${answer}" is invalid. Points removed.`);
      } else {
        // Challenge failed — return the challenge token
        S.challenges[S.myName]=Math.max(0,(S.challenges[S.myName]||1)-1);
        alert(`❌ Challenge failed. "${answer}" stands. Your challenge token returned.`);
      }
    }
  },1000);
}

function generateShareCard(name,scoreText,prompt,answers,mode){
  try{
    const W=1200,H=680;
    const cv=document.createElement("canvas");
    cv.width=W;cv.height=H;
    const ctx=cv.getContext("2d");
    if(!ctx){_fallbackTextShare(name,scoreText,prompt,answers);return;}

    // Background
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#1a1e2e");bg.addColorStop(1,"#0a0d1a");
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // Subtle grid lines
    ctx.strokeStyle="rgba(255,255,255,0.03)";ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Top gradient bar
    const bar=ctx.createLinearGradient(0,0,W,0);
    bar.addColorStop(0,"#cc0000");bar.addColorStop(0.5,"#ffd700");bar.addColorStop(1,"#cc0000");
    ctx.fillStyle=bar;ctx.fillRect(0,0,W,10);

    // Left red accent
    ctx.fillStyle="#cc0000";ctx.fillRect(0,10,6,H-10);

    // Logo
    ctx.font="900 80px Arial Black,Arial,sans-serif";
    const logoGrad=ctx.createLinearGradient(60,60,700,120);
    logoGrad.addColorStop(0,"#ffffff");
    logoGrad.addColorStop(0.5,"#ffd700");
    logoGrad.addColorStop(1,"#cc0000");
    ctx.fillStyle=logoGrad;
    ctx.fillText("SUBMISSION",62,120);

    // Tagline
    ctx.fillStyle="rgba(255,255,255,0.28)";
    ctx.font="300 22px Arial,sans-serif";
    ctx.fillText("MAKE YOUR FRIENDS TAP OUT",64,152);

    // Mode badge (manual rounded rect for compat)
    const badgeColor=mode==="gauntlet"?"#b8860b":"#cc0000";
    const badgeText=mode==="gauntlet"?"🔥 THE GAUNTLET":"⭐ THE CARD";
    const bx=62,by=168,bw=mode==="gauntlet"?238:178,bh=44,br=8;
    ctx.fillStyle=badgeColor;
    ctx.beginPath();
    ctx.moveTo(bx+br,by);ctx.lineTo(bx+bw-br,by);
    ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
    ctx.lineTo(bx+bw,by+bh-br);
    ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
    ctx.lineTo(bx+br,by+bh);
    ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
    ctx.lineTo(bx,by+br);
    ctx.quadraticCurveTo(bx,by,bx+br,by);
    ctx.closePath();ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 20px Arial,sans-serif";
    ctx.fillText(badgeText,78,198);

    // Horizontal rule
    ctx.strokeStyle="rgba(255,255,255,0.07)";ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(62,232);ctx.lineTo(W-60,232);ctx.stroke();

    // Big score number
    const scorePts=scoreText.split(" ")[0];
    const scoreRest=scoreText.split(" ").slice(1).join(" ");
    ctx.fillStyle="#ffd700";ctx.font="900 160px Arial Black,Arial,sans-serif";
    ctx.fillText(scorePts,62,415);
    const sw=ctx.measureText(scorePts).width;
    ctx.fillStyle="rgba(255,215,0,0.5)";ctx.font="bold 34px Arial,sans-serif";
    ctx.fillText(scoreRest,68+sw,398);

    // Player name
    ctx.fillStyle="#ffffff";ctx.font="bold 42px Arial,sans-serif";
    ctx.fillText(name,62,474);

    // Card prompt
    ctx.fillStyle="rgba(255,255,255,0.36)";ctx.font="28px Arial,sans-serif";
    let pText=String(prompt||"");
    while(ctx.measureText(pText).width>W-130&&pText.length>10)pText=pText.slice(0,-1);
    if(pText!==String(prompt||""))pText+="…";
    ctx.fillText(pText,62,520);

    // Answers section
    const top5=(answers||[]).slice(0,5);
    if(top5.length>0){
      ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(62,546);ctx.lineTo(W-60,546);ctx.stroke();
      top5.forEach((a,i)=>{
        const x=62+(i*220);
        if(x>W-180)return;
        const txt=String(a.answer||a).substring(0,18);
        const pts=a.pts?"+"+a.pts+"pt":"";
        ctx.fillStyle=i===0?"#ffd700":"rgba(255,255,255,0.52)";
        ctx.font=(i===0?"bold ":"")+"24px Arial,sans-serif";
        ctx.fillText(txt,x,588);
        if(pts){
          ctx.fillStyle="rgba(255,255,255,0.3)";
          ctx.font="18px Arial,sans-serif";
          ctx.fillText(pts,x,612);
        }
      });
    }

    // Footer bar
    ctx.fillStyle="rgba(204,0,0,0.35)";ctx.fillRect(0,H-56,W,56);
    ctx.fillStyle="rgba(255,255,255,0.45)";ctx.font="24px Arial,sans-serif";
    ctx.fillText(GAME_URL,62,H-20);
    const dateStr=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    const dw=ctx.measureText(dateStr).width;
    ctx.fillText(dateStr,W-dw-60,H-20);

    // Export
    cv.toBlob(blob=>{
      if(!blob){_fallbackTextShare(name,scoreText,prompt,answers);return;}
      if(navigator.share&&navigator.canShare){
        const file=new File([blob],"submission-score.png",{type:"image/png"});
        if(navigator.canShare({files:[file]})){
          navigator.share({title:"SUBMISSION",text:`${name} — ${scoreText} on SUBMISSION!\n${GAME_URL}`,files:[file]}).catch(()=>_downloadBlob(blob));
          return;
        }
      }
      if(navigator.share){navigator.share({title:"SUBMISSION",text:`${name} — ${scoreText} on SUBMISSION!\n${GAME_URL}`}).catch(()=>_downloadBlob(blob));return;}
      _downloadBlob(blob);
    },"image/png",1.0);
  }catch(e){console.error("Share card error:",e);_fallbackTextShare(name,scoreText,prompt,answers);}
}

function _downloadBlob(blob){
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="submission-score.png";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }catch(e){alert("Couldn't download image. Try screenshotting your score!");}
}

function _fallbackTextShare(name,scoreText,prompt,answers){
  const top=(answers||[]).slice(0,5).map(a=>(a.answer||a)+(a.pts?" +"+a.pts+"pt":"")).join(", ");
  const text=`🤼 SUBMISSION\n${name} — ${scoreText}\n"${prompt}"\n${top}\n${GAME_URL}`;
  if(navigator.share){navigator.share({title:"SUBMISSION",text}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert("Score copied to clipboard!"));}
  else{alert(text);}
}

function setupTournament(size){
  S.tournamentBracket = Array.from({length: size}, (_, i) => `Player ${i + 1}`);
  S.tournamentRound = 0;
  S.tournamentMatches = [];
  
  // Create first round matches
  for(let i = 0; i < S.tournamentBracket.length; i += 2){
    S.tournamentMatches.push({
      player1: S.tournamentBracket[i],
      player2: S.tournamentBracket[i + 1] || 'BYE'

  render();
}

function startTournamentRound(){
  S.tournamentMode = true;
  S.screen = 'creating';

// ── LIGHTNING ROUND LOGIC ─────────────────────────────────────────────────────
function shouldTriggerLightning(roundNum){
  if(!S.lightningMode) return false;
  
  if(S.lightningMode === 'random'){
    return Math.random() < 0.25; // 25% chance each round
  } else if(S.lightningMode === 'scheduled'){
    return roundNum > 0 && roundNum % 3 === 0; // Every 3rd round
  } else if(S.lightningMode === 'finale'){
    return roundNum >= 7; // Final 3 rounds in 10-round game
  }
  
  return false;
}

function showLightningAnnouncement(){
  S.lightningAnnouncement = true;
  render();
  
  setTimeout(() => {
    S.lightningAnnouncement = false;
    render();
  }, 3000);
}

render();
</script>
